<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>族群估算互動模擬器</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans TC"', 'sans-serif'],
            chem: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f8fafc;
      margin: 0;
      overflow-x: hidden;
    }
    sup, sub {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 0.72em;
      font-weight: inherit;
      line-height: 0;
      position: relative;
      vertical-align: baseline;
    }
    sup { top: -0.5em; }
    sub { bottom: -0.3em; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    canvas { touch-action: manipulation; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes reveal {
      0% { filter: blur(12px); opacity: 0; transform: scale(0.8); }
      100% { filter: blur(0); opacity: 1; transform: scale(1); }
    }
    .animate-reveal { animation: reveal 0.8s ease-out forwards; }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;justify-content:center;align-items:center;height:100vh">
      <p style="color:#94a3b8;font-size:18px">載入中...</p>
    </div>
  </div>

  <script type="text/babel">
  const { useState, useEffect, useRef, useMemo, useCallback } = React;

  // ==================== Constants ====================
  const CW = 800, CH = 500;
  // 平板高 DPR 會讓 canvas 實際像素隨 dpr² 暴增（dpr=3 時達 360 萬像素/幀），上限鉗在 2 平衡銳利度與填充率
  const MAX_DPR = 2;
  const TOTAL_TREES = 100;
  const TOTAL_FISH = 637;
  const TOTAL_BUTTERFLIES = 523;
  const CAP_MIN = 10, CAP_MAX = 300;
  // 魚池：限縮在左側 (x=30~530)，捕捉區在右側 (x=615~790)，中間留 85px 空隙
  const POND_CX = 280, POND_CY = CH / 2, POND_RX = 250, POND_RY = 200;
  const NET_X = 615, NET_Y = 30, NET_W = 165, NET_H = CH - 60;
  const FIELD_MAX_X = 590; // 蝴蝶野外區右邊界（Tab 3 用）

  const STEP_NAMES = {
    quadrat: ['分割區域', '挑選樣區', '計算平均', '估算總數'],
    capture: ['第一次捕捉', '標記釋放', '第二次捕捉', '估算總數'],
    special: ['第一次捕捉', '標記釋放', '第二次捕捉', '估算總數'],
  };

  const GRID_OPTIONS = [
    { value: 2, label: '2 × 2（4 格）' },
    { value: 3, label: '3 × 3（9 格）' },
    { value: 4, label: '4 × 4（16 格）' },
    { value: 5, label: '5 × 5（25 格）' },
  ];

  const FISH_COLORS = ['#3b82f6','#60a5fa','#2563eb','#1e40af','#38bdf8','#0284c7','#0ea5e9','#7dd3fc'];
  const BUTTERFLY_COLORS = ['#a855f7','#c084fc','#d946ef','#f472b6','#e879f9','#8b5cf6','#a78bfa','#f0abfc'];

  const INSTRUCTIONS = {
    quadrat: [
      '選擇要將區域分成幾格，觀察樹木的分佈情況',
      '點擊格子選取調查樣區，至少選擇 1 格',
      '系統正在計算你所選樣區的平均個體數',
      '估算完成！來看看你的結果多接近實際值吧',
    ],
    capture: [
      '輸入第一次要捕捉的數量（M 隻），這些魚將被標記後放回',
      '觀察標記魚（帶紅點的魚）釋放回池塘後，與其他魚混合',
      '輸入第二次要捕捉的數量，觀察其中有多少帶有標記',
      '估算完成！N = M × n ÷ m，來看看結果吧',
    ],
    special: [
      '輸入第一次要捕捉的數量（M 隻），這些蝴蝶將被標記後放回',
      '觀察標記蝴蝶釋放後，與其他蝴蝶混合',
      '輸入第二次要捕捉的數量，觀察其中有多少帶有標記',
      '比較不同標記方式的結果，思考什麼因素影響了估算精準度？',
    ],
  };

  // ==================== Utility Functions ====================
  function generateTrees(count, w, h) {
    const trees = [];
    // 均勻格狀分佈（jittered grid）：將畫布分成 NxM 格，每格隨機放一棵樹
    const cols = Math.ceil(Math.sqrt(count * (w / h)));
    const rows = Math.ceil(count / cols);
    const cellW = w / cols, cellH = h / rows;
    const positions = [];
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        positions.push([r, c]);
    positions.sort(() => Math.random() - 0.5);
    for (let i = 0; i < count; i++) {
      const [r, c] = positions[i];
      trees.push({
        x: c * cellW + cellW * 0.12 + Math.random() * cellW * 0.76,
        y: r * cellH + cellH * 0.12 + Math.random() * cellH * 0.76,
        sz: 16 + Math.floor(Math.random() * 6),
      });
    }
    return trees;
  }

  function generateFish(count) {
    const fish = [];
    for (let i = 0; i < count; i++) {
      let x, y;
      do {
        x = POND_CX + (Math.random() - 0.5) * 2 * POND_RX;
        y = POND_CY + (Math.random() - 0.5) * 2 * POND_RY;
      } while (((x - POND_CX) / POND_RX) ** 2 + ((y - POND_CY) / POND_RY) ** 2 > 0.88);
      const a = Math.random() * Math.PI * 2;
      const s = 0.2 + Math.random() * 0.4;
      fish.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        size: 3.5 + Math.random() * 3, color: FISH_COLORS[Math.floor(Math.random() * FISH_COLORS.length)],
        isMarked: false, isCaptured: false, isReturning: false, isDead: false,
        targetX: 0, targetY: 0, returnTargetX: 0, returnTargetY: 0,
        wanderTimer: Math.floor(Math.random() * 120),
      });
    }
    return fish;
  }

  function generateButterflies(count) {
    const bfs = [];
    for (let i = 0; i < count; i++) {
      bfs.push({
        x: 20 + Math.random() * (FIELD_MAX_X - 30), y: 20 + Math.random() * (CH - 40),
        vx: (Math.random() - 0.5) * 1.2, vy: (Math.random() - 0.5) * 1.2,
        size: 5 + Math.random() * 5, color: BUTTERFLY_COLORS[Math.floor(Math.random() * BUTTERFLY_COLORS.length)],
        wingPhase: Math.random() * Math.PI * 2, wingSpeed: 0.08 + Math.random() * 0.08,
        isMarked: false, isCaptured: false, isReturning: false, isDead: false,
        markType: null, targetX: 0, targetY: 0, returnTargetX: 0, returnTargetY: 0,
        wanderTimer: Math.floor(Math.random() * 60),
      });
    }
    return bfs;
  }

  function getErrorColor(err) {
    const abs = Math.abs(err);
    if (abs < 10) return 'text-emerald-500';
    if (abs < 30) return 'text-amber-500';
    return 'text-red-500';
  }

  function getErrorBg(err) {
    const abs = Math.abs(err);
    if (abs < 10) return 'bg-emerald-50 border-emerald-200';
    if (abs < 30) return 'bg-amber-50 border-amber-200';
    return 'bg-red-50 border-red-200';
  }

  function formatError(err) {
    if (err > 0) return `+${err.toFixed(1)}`;
    return err.toFixed(1);
  }

  // 正確的 Fisher-Yates 洗牌（修正 sort() 偏差問題）
  function fisherYates(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ==================== Shared Components ====================
  const CustomSelect = ({ value, onChange, children, className = '', disabled = false }) => (
    <div className={`relative ${className}`}>
      <select value={value} onChange={onChange} disabled={disabled}
        className={`appearance-none bg-white border-2 border-slate-300 rounded-xl py-2.5 pl-4 pr-10
          text-slate-700 font-bold focus:outline-none focus:border-blue-500 focus:ring-4
          focus:ring-blue-500/20 shadow-sm transition-all cursor-pointer hover:bg-slate-50 w-full
          ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`}>
        {children}
      </select>
      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
        <svg className="fill-current h-4 w-4" viewBox="0 0 20 20">
          <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
        </svg>
      </div>
    </div>
  );

  const Toast = ({ msg }) => (
    <div className={`fixed bottom-28 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 pointer-events-none
      ${msg ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
      <div className="bg-red-500 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 font-bold text-base">
        <svg className="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        {msg}
      </div>
    </div>
  );

  const StepIndicator = ({ steps, currentStep }) => (
    <div className="w-full py-4 px-2">
      <div className="flex items-center justify-between max-w-md mx-auto">
        {steps.map((name, i) => {
          const sn = i + 1;
          const done = sn < currentStep;
          const cur = sn === currentStep;
          return (
            <React.Fragment key={i}>
              {i > 0 && (
                <div className={`flex-1 h-1 mx-1 rounded-full transition-colors duration-500 ${sn <= currentStep ? 'bg-blue-500' : 'bg-slate-200'}`} />
              )}
              <div className="flex flex-col items-center flex-shrink-0">
                <div className={`w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-500
                  ${done ? 'bg-blue-600 text-white' : cur ? 'bg-blue-600 text-white scale-110 shadow-lg shadow-blue-500/30 ring-4 ring-blue-500/20' : 'border-2 border-slate-300 text-slate-400 bg-white'}`}>
                  {done ? (
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/>
                    </svg>
                  ) : sn}
                </div>
                <span className={`text-xs mt-1.5 font-medium hidden md:block transition-colors ${cur ? 'text-blue-600' : done ? 'text-blue-400' : 'text-slate-400'}`}>{name}</span>
              </div>
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );

  const Header = () => (
    <header className="w-full bg-blue-600 text-white py-6 px-4 text-center shadow-md z-20 relative">
      <h1 className="text-3xl md:text-4xl font-black tracking-wider mb-2 drop-shadow-md">族群估算互動模擬器</h1>
      <p className="text-sm md:text-base text-blue-100 font-medium">探索樣區法與捉放法的估算邏輯</p>
    </header>
  );

  const NAV_ITEMS = [
    { id: 'quadrat', label: '樣區法', icon: (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
          d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
      </svg>
    )},
    { id: 'capture', label: '捉放法', icon: (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
          d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
      </svg>
    )},
    { id: 'special', label: '特殊情況', icon: (
      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    )},
  ];

  const BottomNav = ({ activeTab, onTabChange }) => (
    <nav className="fixed bottom-0 left-0 w-full bg-slate-900 flex justify-center z-50 border-t-4 border-slate-700 shadow-[0_-5px_15px_rgba(0,0,0,0.3)]">
      {NAV_ITEMS.map((item, i) => (
        <React.Fragment key={item.id}>
          {i > 0 && <div className="w-0.5 bg-slate-700 my-2"></div>}
          <button onClick={() => onTabChange(item.id)}
            className={`flex-1 max-w-xs py-4 font-bold text-base transition-all duration-300
              ${activeTab === item.id
                ? 'bg-slate-800 text-white border-t-4 border-blue-500 -mt-1 rounded-t-xl'
                : 'text-slate-200 hover:text-white border-t-4 border-transparent hover:bg-slate-800/50'}`}>
            <div className="flex items-center justify-center gap-2">
              {item.icon}
              <span className="hidden sm:inline">{item.label}</span>
            </div>
          </button>
        </React.Fragment>
      ))}
    </nav>
  );

  // ==================== Canvas Drawing Helpers ====================
  function drawTree(ctx, t) {
    ctx.save();
    ctx.font = `${t.sz || 20}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🌳', t.x, t.y);
    ctx.restore();
  }

  function drawPondBg(ctx) {
    const grad = ctx.createLinearGradient(0, 0, CW, CH);
    grad.addColorStop(0, '#86efac'); grad.addColorStop(1, '#4ade80');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, CW, CH);
    ctx.save();
    ctx.beginPath(); ctx.ellipse(POND_CX, POND_CY, POND_RX + 5, POND_RY + 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#065f46'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(POND_CX, POND_CY, POND_RX, POND_RY, 0, 0, Math.PI * 2);
    const pg = ctx.createRadialGradient(POND_CX, POND_CY - 30, 10, POND_CX, POND_CY, POND_RX);
    pg.addColorStop(0, '#67e8f9'); pg.addColorStop(0.5, '#22d3ee'); pg.addColorStop(1, '#0e7490');
    ctx.fillStyle = pg; ctx.fill(); ctx.restore();
  }

  function drawFishEntity(ctx, f) {
    if (f.isDead) return;
    ctx.save();
    ctx.translate(f.x, f.y);
    if ((f.vx || 0) < -0.05) ctx.scale(-1, 1);
    ctx.font = `${11 + Math.floor(f.size * 0.5)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐟', 0, 0);
    if (f.isMarked) {
      ctx.fillStyle = '#ef4444';
      ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 3;
      ctx.beginPath(); ctx.arc(0, -8, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  function drawMeadowBg(ctx) {
    const sky = ctx.createLinearGradient(0, 0, 0, CH * 0.35);
    sky.addColorStop(0, '#bfdbfe'); sky.addColorStop(1, '#e0f2fe');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, CH);
    const gnd = ctx.createLinearGradient(0, CH * 0.28, 0, CH);
    gnd.addColorStop(0, '#86efac'); gnd.addColorStop(1, '#4ade80');
    ctx.fillStyle = gnd; ctx.fillRect(0, CH * 0.28, CW, CH * 0.72);
    [[45, CH * 0.28], [CW - 55, CH * 0.3], [110, CH * 0.26], [CW - 120, CH * 0.24]].forEach(([tx, ty]) => {
      ctx.fillStyle = '#92400e'; ctx.fillRect(tx - 4, ty, 8, 45);
      ctx.fillStyle = '#15803d'; ctx.beginPath(); ctx.arc(tx, ty - 8, 20, 0, Math.PI * 2); ctx.fill();
    });
    const fc = ['#fbbf24','#f472b6','#a78bfa','#fb923c','#f87171'];
    for (let i = 0; i < 25; i++) {
      ctx.fillStyle = fc[i % fc.length];
      ctx.beginPath();
      ctx.arc(30 + (CW - 60) * i / 25 + Math.sin(i * 7) * 12, CH * 0.88 + Math.sin(i * 3) * 15, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawButterflyEntity(ctx, b) {
    if (b.isDead) return;
    ctx.save();
    ctx.translate(b.x, b.y);
    const flapScale = 0.85 + 0.15 * Math.abs(Math.sin(b.wingPhase));
    const fontSize = Math.round((13 + b.size * 0.4) * flapScale);
    ctx.font = `${fontSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🦋', 0, 0);
    if (b.isMarked) {
      if (b.markType === 'fluorescent') {
        ctx.fillStyle = '#4ade80';
        ctx.shadowColor = '#4ade80'; ctx.shadowBlur = 5;
        ctx.beginPath(); ctx.arc(0, -10, 3, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawNetArea(ctx, phase) {
    ctx.save();
    // 永遠顯示的分隔線與區域標籤
    const sepX = NET_X - 12;
    ctx.strokeStyle = 'rgba(100,116,139,0.45)'; ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 5]);
    ctx.beginPath(); ctx.moveTo(sepX, 5); ctx.lineTo(sepX, CH - 5); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
    ctx.textAlign = 'left'; ctx.fillStyle = 'rgba(71,85,105,0.85)';
    ctx.fillText('捕捉網區域', sepX + 5, 16);
    ctx.font = '10px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
    ctx.fillStyle = 'rgba(71,85,105,0.6)';
    ctx.fillText('捕捉後移至此處', sepX + 5, 31);

    // 捕捉中才顯示容器框
    if (['capturing1','captured1','marking','capturing2','captured2'].includes(phase)) {
      ctx.fillStyle = 'rgba(248,250,252,0.15)';
      ctx.fillRect(NET_X, NET_Y, NET_W, NET_H);
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(NET_X, NET_Y, NET_W, NET_H);
      ctx.setLineDash([]);
    }
    ctx.restore();
  }

  // ==================== Movement Updates ====================
  function updateFishPos(fish) {
    fish.forEach(f => {
      if (f.isDead) return;
      if (f.isCaptured) {
        const dx = f.targetX - f.x, dy = f.targetY - f.y;
        if (dx * dx + dy * dy < 4) { f.x = f.targetX; f.y = f.targetY; }
        else { f.x += dx * 0.05; f.y += dy * 0.05; }
      } else if (f.isReturning) {
        const dx = f.returnTargetX - f.x, dy = f.returnTargetY - f.y;
        if (dx * dx + dy * dy < 9) { f.isReturning = false; f.x = f.returnTargetX; f.y = f.returnTargetY; }
        else { f.x += dx * 0.04; f.y += dy * 0.04; }
      } else {
        f.wanderTimer--;
        if (f.wanderTimer <= 0) {
          f.wanderTimer = 60 + Math.floor(Math.random() * 120);
          const a = Math.atan2(f.vy, f.vx) + (Math.random() - 0.5) * 2;
          const s = 0.2 + Math.random() * 0.5;
          f.vx = Math.cos(a) * s; f.vy = Math.sin(a) * s;
        }
        f.x += f.vx; f.y += f.vy;
        const dx = (f.x - POND_CX) / POND_RX, dy = (f.y - POND_CY) / POND_RY;
        if (dx * dx + dy * dy > 0.88) {
          const tc = Math.atan2(POND_CY - f.y, POND_CX - f.x);
          f.vx = Math.cos(tc) * 0.5; f.vy = Math.sin(tc) * 0.5;
          f.x += f.vx * 3; f.y += f.vy * 3;
        }
      }
    });
  }

  function updateButterflyPos(bfs, markingMethod) {
    bfs.forEach(b => {
      if (b.isDead) return;
      if (b.isCaptured) {
        const dx = b.targetX - b.x, dy = b.targetY - b.y;
        if (dx * dx + dy * dy < 4) { b.x = b.targetX; b.y = b.targetY; }
        else { b.x += dx * 0.05; b.y += dy * 0.05; }
      } else if (b.isReturning) {
        const dx = b.returnTargetX - b.x, dy = b.returnTargetY - b.y;
        if (dx * dx + dy * dy < 9) { b.isReturning = false; b.x = b.returnTargetX; b.y = b.returnTargetY; }
        else { b.x += dx * 0.04; b.y += dy * 0.04; }
      } else {
        b.wanderTimer--;
        if (b.wanderTimer <= 0) {
          b.wanderTimer = 30 + Math.floor(Math.random() * 60);
          const a = Math.random() * Math.PI * 2;
          const spd = (0.4 + Math.random() * 0.8) * (b.isMarked && b.markType === 'metalRing' ? 0.45 : 1.0);
          b.vx = Math.cos(a) * spd; b.vy = Math.sin(a) * spd;
        }
        b.x += b.vx + Math.sin(b.wingPhase * 2) * 0.2;
        b.y += b.vy + Math.cos(b.wingPhase * 3) * 0.15;
        if (b.x < 15 || b.x > FIELD_MAX_X) b.vx *= -1;
        if (b.y < 15 || b.y > CH - 15) b.vy *= -1;
        b.x = Math.max(15, Math.min(FIELD_MAX_X, b.x));
        b.y = Math.max(15, Math.min(CH - 15, b.y));
      }
      b.wingPhase += b.wingSpeed;
    });
  }

  // ==================== Tab 1: Quadrat Method ====================
  const QuadratTab = ({ onReset }) => {
    const [step, setStep] = useState(1);
    const [gridSize, setGridSize] = useState('');
    const [selectedCells, setSelectedCells] = useState(new Set());
    const [canAdvance, setCanAdvance] = useState(false);
    const canvasRef = useRef(null);
    const treesRef = useRef([]);

    useEffect(() => {
      treesRef.current = generateTrees(TOTAL_TREES, CW, CH);
      drawCanvas();
    }, []);

    const gs = gridSize ? Number(gridSize) : 0;

    const treeCounts = useMemo(() => {
      if (!gs) return {};
      const cellW = CW / gs, cellH = CH / gs, counts = {};
      selectedCells.forEach(key => {
        const [r, c] = key.split('-').map(Number);
        counts[key] = treesRef.current.filter(t =>
          t.x >= c * cellW && t.x < (c + 1) * cellW && t.y >= r * cellH && t.y < (r + 1) * cellH
        ).length;
      });
      return counts;
    }, [gs, selectedCells]);

    const totalInSamples = Object.values(treeCounts).reduce((a, b) => a + b, 0);
    const average = selectedCells.size > 0 ? totalInSamples / selectedCells.size : 0;
    const totalCells = gs * gs;
    const estimate = step >= 4 ? Math.round(average * totalCells) : null;
    const errorRate = estimate !== null ? (estimate - TOTAL_TREES) / TOTAL_TREES * 100 : null;

    const drawCanvas = useCallback(() => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      const dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
      canvas.width = CW * dpr; canvas.height = CH * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      const grad = ctx.createLinearGradient(0, 0, 0, CH);
      grad.addColorStop(0, '#a7d397'); grad.addColorStop(1, '#7caa2d');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, CW, CH);

      treesRef.current.forEach(t => drawTree(ctx, t));

      if (gs) {
        const cellW = CW / gs, cellH = CH / gs;
        const showAll = step >= 4;
        const cells = showAll ? new Set(Array.from({ length: gs * gs }, (_, i) => `${Math.floor(i / gs)}-${i % gs}`)) : selectedCells;

        cells.forEach(key => {
          const [r, c] = key.split('-').map(Number);
          const isSelected = selectedCells.has(key);
          ctx.fillStyle = isSelected ? 'rgba(59,130,246,0.2)' : (showAll ? 'rgba(148,163,184,0.1)' : 'transparent');
          ctx.fillRect(c * cellW, r * cellH, cellW, cellH);
          if (isSelected) {
            ctx.strokeStyle = 'rgba(59,130,246,0.8)'; ctx.lineWidth = 2.5;
            ctx.strokeRect(c * cellW + 1, r * cellH + 1, cellW - 2, cellH - 2);
          }
        });

        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
        for (let i = 1; i < gs; i++) {
          ctx.beginPath(); ctx.moveTo(i * cellW, 0); ctx.lineTo(i * cellW, CH); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, i * cellH); ctx.lineTo(CW, i * cellH); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, CW, CH);

        const countCells = (step >= 2) ? (showAll ? cells : selectedCells) : new Set();
        countCells.forEach(key => {
          const [r, c] = key.split('-').map(Number);
          const count = treesRef.current.filter(t =>
            t.x >= c * cellW && t.x < (c + 1) * cellW && t.y >= r * cellH && t.y < (r + 1) * cellH
          ).length;
          const tx = (c + 1) * cellW - 14, ty = (r + 1) * cellH - 11;
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          ctx.beginPath();
          ctx.roundRect(tx - 11, ty - 9, 22, 18, 4);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(String(count), tx, ty);
        });
      }
    }, [gs, selectedCells, step]);

    useEffect(() => { drawCanvas(); }, [drawCanvas]);

    useEffect(() => {
      if (step === 1) setCanAdvance(!!gs);
      if (step === 2) setCanAdvance(selectedCells.size > 0);
      if (step === 3) setCanAdvance(true);
    }, [step, gs, selectedCells]);

    const handleClick = (e) => {
      if (!gs || step !== 2) return;
      const rect = canvasRef.current.getBoundingClientRect();
      const sx = CW / rect.width, sy = CH / rect.height;
      const x = (e.clientX - rect.left) * sx, y = (e.clientY - rect.top) * sy;
      const col = Math.floor(x / (CW / gs)), row = Math.floor(y / (CH / gs));
      if (col < 0 || col >= gs || row < 0 || row >= gs) return;
      const key = `${row}-${col}`;
      setSelectedCells(prev => {
        const next = new Set(prev);
        next.has(key) ? next.delete(key) : next.add(key);
        return next;
      });
    };

    const handleNext = () => {
      if (!canAdvance) return;
      setStep(s => Math.min(s + 1, 4));
      setCanAdvance(false);
    };

    const handleGridChange = (e) => {
      setGridSize(e.target.value);
      setSelectedCells(new Set());
      if (step > 1) { setStep(1); setCanAdvance(!!e.target.value); }
    };

    return (
      <div className="flex flex-col">
        <StepIndicator steps={STEP_NAMES.quadrat} currentStep={step} />
        <div className="flex flex-col md:flex-row gap-4 md:gap-6 py-2">
          <div className="w-full md:w-3/5">
            <canvas ref={canvasRef} onClick={handleClick}
              className="w-full rounded-2xl shadow-lg cursor-pointer border border-slate-200"
              style={{ aspectRatio: `${CW}/${CH}` }} />
          </div>
          <div className="w-full md:w-2/5 flex flex-col gap-3">
            <div className="bg-white border border-slate-200 shadow-xl rounded-2xl p-5">
              <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                估算結果
              </h3>
              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <span className="text-slate-500 font-medium">實際總數</span>
                  {step < 4 ? <span className="text-2xl font-black text-slate-300">？？？</span>
                    : <span className="text-2xl font-black text-slate-800 animate-reveal">{TOTAL_TREES}</span>}
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-slate-500 font-medium">你的估算</span>
                  <span className="text-2xl font-bold text-blue-600">{estimate !== null ? estimate : '---'}</span>
                </div>
                {step >= 4 && errorRate !== null && (
                  <div className={`p-3 rounded-xl border animate-fade-in ${getErrorBg(errorRate)}`}>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-600 font-medium">估算誤差</span>
                      <span className={`text-2xl font-black ${getErrorColor(errorRate)}`}>{formatError(errorRate)}%</span>
                    </div>
                    <p className="text-xs text-slate-400 mt-1 text-right">正值 = 高估，負值 = 低估</p>
                  </div>
                )}
                {step < 4 && (
                  <p className="text-xs text-slate-400 text-center pt-1">完成所有步驟後將顯示結果</p>
                )}
              </div>
            </div>

            <div className="bg-slate-50 shadow-inner rounded-2xl p-4">
              <p className="text-slate-600 font-medium text-sm">{INSTRUCTIONS.quadrat[step - 1]}</p>
            </div>

            {step === 1 && (
              <CustomSelect value={gridSize} onChange={handleGridChange}>
                <option value="">選擇格線大小</option>
                {GRID_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </CustomSelect>
            )}

            {step === 2 && (
              <div className="bg-blue-50 border border-blue-200 rounded-2xl p-3 text-sm text-blue-700 font-medium">
                已選取 {selectedCells.size} 格
              </div>
            )}

            {step >= 3 && selectedCells.size > 0 && (
              <div className="bg-white border border-slate-200 rounded-2xl p-4 animate-fade-in">
                <h4 className="font-bold text-slate-700 mb-2 text-sm">計算過程</h4>
                <div className="text-sm text-slate-600 space-y-1">
                  <div className="flex flex-wrap gap-2">
                    {Array.from(selectedCells).map(key => {
                      const [r, c] = key.split('-').map(Number);
                      return <span key={key} className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-bold">格({r+1},{c+1}): {treeCounts[key] || 0}棵</span>;
                    })}
                  </div>
                  <div className="pt-2 border-t border-slate-200 mt-2 font-bold text-slate-700">
                    平均 = {totalInSamples} ÷ {selectedCells.size} = {average.toFixed(1)} 棵/格
                  </div>
                  {step >= 4 && (
                    <div className="text-base font-black text-blue-600 pt-1">
                      估算 = {average.toFixed(1)} × {totalCells} = {estimate}
                    </div>
                  )}
                  {selectedCells.size === 1 && (
                    <div className="mt-2 p-2 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700 font-medium">
                      樣本數偏少，估算誤差可能較大，建議多選幾格
                    </div>
                  )}
                </div>
              </div>
            )}

            {step < 4 && !canAdvance && (
              <p className="text-center text-xs text-slate-400 -mb-1">
                {step === 1 ? '請先選擇格線大小' : '請先點擊畫布選取至少一個樣區'}
              </p>
            )}
            <div className="flex gap-3 mt-auto">
              {step < 4 && (
                <button onClick={handleNext} disabled={!canAdvance}
                  title={!canAdvance ? (step === 1 ? '請先選擇格線大小' : '請先點擊畫布選取至少一個樣區') : ''}
                  className={`flex-1 font-bold py-3 rounded-xl shadow-lg transition-all duration-200
                    ${canAdvance ? 'bg-blue-600 hover:bg-blue-700 text-white hover:scale-105 active:scale-95' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}>
                  下一步
                </button>
              )}
              <button onClick={() => { if (window.confirm('確定要重新開始嗎？')) onReset(); }}
                className="flex-1 bg-white border-2 border-amber-400 text-amber-600 hover:bg-amber-50 font-bold py-3 rounded-xl shadow-sm transition-all">
                重新開始
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ==================== Tab 2: Capture-Recapture ====================
  const CaptureTab = ({ onReset }) => {
    const [step, setStep] = useState(1);
    const [capInput, setCapInput] = useState('');
    const [firstCap, setFirstCap] = useState(0);
    const [secondCap, setSecondCap] = useState(0);
    const [markedInSec, setMarkedInSec] = useState(0);
    const [isAnim, setIsAnim] = useState(false);
    const [canAdv, setCanAdv] = useState(false);
    const [toast, setToast] = useState('');
    const [inputError, setInputError] = useState('');

    const canvasRef = useRef(null);
    const fishRef = useRef([]);
    const phaseRef = useRef('idle');
    const frameRef = useRef(0);
    const rafRef = useRef(null);

    const estimate = (step >= 4 && markedInSec > 0) ? Math.round(firstCap * secondCap / markedInSec) : null;
    const errorRate = estimate !== null ? (estimate - TOTAL_FISH) / TOTAL_FISH * 100 : null;

    const validateCapInput = (val) => {
      if (val === '') { setInputError(''); return; }
      const n = parseInt(val);
      if (isNaN(n) || !Number.isInteger(Number(val))) { setInputError('請輸入整數'); return; }
      if (n < CAP_MIN || n > CAP_MAX) { setInputError(`請輸入 ${CAP_MIN} ~ ${CAP_MAX} 之間的數量`); return; }
      setInputError('');
    };

    const handleCapInputChange = (val) => {
      setCapInput(val);
      validateCapInput(val);
    };

    useEffect(() => {
      const canvas = canvasRef.current;
      const dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
      canvas.width = CW * dpr; canvas.height = CH * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      fishRef.current = generateFish(TOTAL_FISH);

      const loop = () => {
        updateFishPos(fishRef.current);
        const phase = phaseRef.current;
        frameRef.current++;

        if (phase === 'capturing1' || phase === 'capturing2') {
          const cap = fishRef.current.filter(f => f.isCaptured);
          const done = cap.every(f => {
            const dx = f.targetX - f.x, dy = f.targetY - f.y;
            return dx * dx + dy * dy < 20;
          }) || frameRef.current > 200;
          if (done) {
            if (phase === 'capturing1') {
              phaseRef.current = 'captured1';
              setIsAnim(false); setCanAdv(true);
            } else {
              const m = cap.filter(f => f.isMarked).length;
              setMarkedInSec(m);
              phaseRef.current = 'captured2';
              setIsAnim(false);
              if (m > 0) setCanAdv(true);
            }
          }
        }
        if (phase === 'marking' && frameRef.current > 90) {
          fishRef.current.forEach(f => {
            if (f.isCaptured) {
              f.isCaptured = false; f.isReturning = true;
              const a = Math.random() * Math.PI * 2, r = Math.random() * 0.7;
              f.returnTargetX = POND_CX + Math.cos(a) * POND_RX * r;
              f.returnTargetY = POND_CY + Math.sin(a) * POND_RY * r;
            }
          });
          phaseRef.current = 'releasing'; frameRef.current = 0;
        }
        if (phase === 'releasing') {
          const ret = fishRef.current.filter(f => f.isReturning);
          if (ret.length === 0 || frameRef.current > 200) {
            phaseRef.current = 'mixing'; frameRef.current = 0;
          }
        }
        if (phase === 'mixing' && frameRef.current > 150) {
          phaseRef.current = 'idle';
          setIsAnim(false); setCanAdv(true);
        }

        ctx.clearRect(0, 0, CW, CH);
        drawPondBg(ctx);
        fishRef.current.forEach(f => drawFishEntity(ctx, f));
        drawNetArea(ctx, phaseRef.current);

        if (phase === 'mixing') {
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.font = 'bold 16px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('標記魚正在混合中...', POND_CX, 22);
        }

        rafRef.current = requestAnimationFrame(loop);
      };
      rafRef.current = requestAnimationFrame(loop);
      return () => cancelAnimationFrame(rafRef.current);
    }, []);

    useEffect(() => {
      if (step === 2) {
        setIsAnim(true); setCanAdv(false);
        fishRef.current.forEach(f => { if (f.isCaptured) f.isMarked = true; });
        phaseRef.current = 'marking'; frameRef.current = 0;
      }
    }, [step]);

    useEffect(() => {
      if (toast) { const t = setTimeout(() => setToast(''), 3000); return () => clearTimeout(t); }
    }, [toast]);

    const handleCapture = (isSecond = false) => {
      const count = parseInt(capInput);
      if (isNaN(count) || count < CAP_MIN || count > CAP_MAX) return;
      const alive = fishRef.current.filter(f => !f.isDead && !f.isCaptured);
      const n = Math.min(count, alive.length);
      if (isSecond) setSecondCap(n); else setFirstCap(n);

      // 使用 Fisher-Yates 真正隨機洗牌（修正 sort() 偏差導致估算誤差過大的問題）
      fisherYates(alive).slice(0, n).forEach(f => {
        f.isCaptured = true;
        f.targetX = NET_X + 10 + Math.random() * (NET_W - 20);
        f.targetY = NET_Y + 10 + Math.random() * (NET_H - 20);
      });
      phaseRef.current = isSecond ? 'capturing2' : 'capturing1';
      frameRef.current = 0;
      setIsAnim(true); setCanAdv(false); setCapInput(''); setInputError('');
    };

    const handleNext = () => {
      if (!canAdv) return;
      setStep(s => Math.min(s + 1, 4));
      setCanAdv(false); setCapInput('');
    };

    return (
      <div className="flex flex-col">
        <Toast msg={toast} />
        <StepIndicator steps={STEP_NAMES.capture} currentStep={step} />
        <div className="flex flex-col md:flex-row gap-4 md:gap-6 py-2">
          <div className="w-full md:w-3/5">
            <canvas ref={canvasRef}
              className="w-full rounded-2xl shadow-lg border border-slate-200"
              style={{ aspectRatio: `${CW}/${CH}` }} />
          </div>
          <div className="w-full md:w-2/5 flex flex-col gap-3">
            <div className="bg-white border border-slate-200 shadow-xl rounded-2xl p-5">
              <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                估算結果
              </h3>
              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <span className="text-slate-500 font-medium">實際總數</span>
                  {step < 4 ? <span className="text-2xl font-black text-slate-300">？？？</span>
                    : <span className="text-2xl font-black text-slate-800 animate-reveal">{TOTAL_FISH}</span>}
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-slate-500 font-medium">你的估算</span>
                  <span className="text-2xl font-bold text-blue-600">{estimate !== null ? estimate : '---'}</span>
                </div>
                {step >= 4 && errorRate !== null && (
                  <div className={`p-3 rounded-xl border animate-fade-in ${getErrorBg(errorRate)}`}>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-600 font-medium">估算誤差</span>
                      <span className={`text-2xl font-black ${getErrorColor(errorRate)}`}>{formatError(errorRate)}%</span>
                    </div>
                    <p className="text-xs text-slate-400 mt-1 text-right">正值 = 高估，負值 = 低估</p>
                  </div>
                )}
                {step < 4 && (
                  <p className="text-xs text-slate-400 text-center pt-1">完成所有步驟後將顯示結果</p>
                )}
              </div>
            </div>

            <div className="bg-slate-50 shadow-inner rounded-2xl p-4">
              <p className="text-slate-600 font-medium text-sm">{INSTRUCTIONS.capture[step - 1]}</p>
            </div>

            {step >= 1 && step < 4 && (
              <div className="bg-white border border-slate-200 rounded-2xl p-4 space-y-3">
                {firstCap > 0 && (
                  <div className="text-sm text-slate-600">
                    <span className="font-bold text-slate-700">M（第一次捕捉）= {firstCap}</span>
                  </div>
                )}
                {step >= 3 && secondCap > 0 && (
                  <div className="text-sm text-slate-600 space-y-1">
                    <div><span className="font-bold text-slate-700">n（第二次捕捉）= {secondCap}</span></div>
                    <div><span className="font-bold text-slate-700">m（其中有標記）= {markedInSec}</span></div>
                    {markedInSec === 0 && (
                      <div className="text-red-500 font-bold text-xs mt-1">第二次捕獲中沒有發現標記個體，請增加捕捉數量後重試</div>
                    )}
                  </div>
                )}
                {((step === 1 && !isAnim && firstCap === 0) || (step === 3 && !isAnim && secondCap === 0)) && (
                  <div className="space-y-1">
                    <div className="flex gap-2">
                      <input type="number" value={capInput} onChange={e => handleCapInputChange(e.target.value)}
                        placeholder={`輸入數量（${CAP_MIN}~${CAP_MAX}）`}
                        className={`flex-1 border-2 rounded-xl py-2.5 px-4 text-slate-700 font-bold
                          focus:outline-none focus:ring-4 shadow-sm transition-all
                          ${inputError ? 'border-red-400 focus:border-red-500 focus:ring-red-500/20' : 'border-slate-300 focus:border-blue-500 focus:ring-blue-500/20'}`} />
                      <button onClick={() => handleCapture(step === 3)} disabled={!capInput || !!inputError || isAnim}
                        className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white
                          font-bold py-2.5 px-5 rounded-xl shadow-lg transition-all">
                        捕捉
                      </button>
                    </div>
                    {inputError && <p className="text-red-500 text-xs font-medium pl-1">{inputError}</p>}
                  </div>
                )}
                {isAnim && <div className="text-blue-500 font-bold text-sm animate-pulse">動畫進行中...</div>}
              </div>
            )}

            {step >= 4 && estimate !== null && (
              <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 animate-fade-in">
                <div className="text-sm text-slate-600 mb-1 font-medium">N = M × n ÷ m</div>
                <div className="text-base font-bold text-slate-700">
                  N = {firstCap} × {secondCap} ÷ {markedInSec} = <span className="text-blue-600 text-xl font-black">{estimate}</span>
                </div>
                <p className="text-xs text-slate-500 mt-2">試著改變取樣數量，觀察取樣量對估算精準度的影響</p>
              </div>
            )}

            <div className="flex gap-3 mt-auto">
              {step < 4 && (
                <button onClick={handleNext} disabled={!canAdv}
                  className={`flex-1 font-bold py-3 rounded-xl shadow-lg transition-all duration-200
                    ${canAdv ? 'bg-blue-600 hover:bg-blue-700 text-white hover:scale-105 active:scale-95' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}>
                  下一步
                </button>
              )}
              <button onClick={() => { if (window.confirm('確定要重新開始嗎？')) onReset(); }}
                className="flex-1 bg-white border-2 border-amber-400 text-amber-600 hover:bg-amber-50 font-bold py-3 rounded-xl shadow-sm transition-all">
                重新開始
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ==================== Tab 3: Special Cases ====================
  const SpecialTab = ({ onReset }) => {
    const [markMethod, setMarkMethod] = useState('');
    const [step, setStep] = useState(1);
    const [capInput, setCapInput] = useState('');
    const [firstCap, setFirstCap] = useState(0);
    const [secondCap, setSecondCap] = useState(0);
    const [markedInSec, setMarkedInSec] = useState(0);
    const [isAnim, setIsAnim] = useState(false);
    const [canAdv, setCanAdv] = useState(false);
    const [toast, setToast] = useState('');

    const canvasRef = useRef(null);
    const bfRef = useRef([]);
    const phaseRef = useRef('idle');
    const frameRef = useRef(0);
    const rafRef = useRef(null);
    const deathDoneRef = useRef(false);

    const estimate = (step >= 4 && markedInSec > 0) ? Math.round(firstCap * secondCap / markedInSec) : null;
    const actualAlive = useMemo(() => {
      return TOTAL_BUTTERFLIES;
    }, []);
    const errorRate = estimate !== null ? (estimate - actualAlive) / actualAlive * 100 : null;
    const [inputError, setInputError] = useState('');

    const validateCapInput = (val) => {
      if (val === '') { setInputError(''); return; }
      const n = parseInt(val);
      if (isNaN(n) || !Number.isInteger(Number(val))) { setInputError('請輸入整數'); return; }
      if (n < CAP_MIN || n > CAP_MAX) { setInputError(`請輸入 ${CAP_MIN} ~ ${CAP_MAX} 之間的數量`); return; }
      setInputError('');
    };

    const handleCapInputChange = (val) => {
      setCapInput(val);
      validateCapInput(val);
    };

    useEffect(() => {
      const canvas = canvasRef.current;
      const dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);
      canvas.width = CW * dpr; canvas.height = CH * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      bfRef.current = generateButterflies(TOTAL_BUTTERFLIES);

      const loop = () => {
        updateButterflyPos(bfRef.current, markMethod);
        const phase = phaseRef.current;
        frameRef.current++;

        if (phase === 'capturing1' || phase === 'capturing2') {
          const cap = bfRef.current.filter(f => f.isCaptured);
          const done = cap.every(f => {
            const dx = f.targetX - f.x, dy = f.targetY - f.y;
            return dx * dx + dy * dy < 20;
          }) || frameRef.current > 200;
          if (done) {
            if (phase === 'capturing1') {
              phaseRef.current = 'captured1';
              setIsAnim(false); setCanAdv(true);
            } else {
              const m = cap.filter(f => f.isMarked).length;
              setMarkedInSec(m);
              phaseRef.current = 'captured2';
              setIsAnim(false);
              if (m > 0) setCanAdv(true);
            }
          }
        }
        if (phase === 'marking' && frameRef.current > 90) {
          bfRef.current.forEach(f => {
            if (f.isCaptured) {
              f.isCaptured = false; f.isReturning = true;
              // 釋放回野外區（左側），不超過 FIELD_MAX_X
              f.returnTargetX = 20 + Math.random() * (FIELD_MAX_X - 30);
              f.returnTargetY = 20 + Math.random() * (CH - 40);
            }
          });
          phaseRef.current = 'releasing'; frameRef.current = 0;
          deathDoneRef.current = false;
        }
        if (phase === 'releasing') {
          const ret = bfRef.current.filter(f => f.isReturning);
          if (ret.length === 0 || frameRef.current > 200) {
            phaseRef.current = 'mixing'; frameRef.current = 0;
          }
        }
        if (phase === 'mixing') {
          // Fluorescent paint: kill 30% of marked butterflies gradually
          if (markMethod === 'fluorescent' && !deathDoneRef.current) {
            const marked = bfRef.current.filter(f => f.isMarked && !f.isDead);
            const targetDeaths = Math.round(firstCap * 0.3);
            const currentDeaths = bfRef.current.filter(f => f.isMarked && f.isDead).length;
            if (currentDeaths < targetDeaths && frameRef.current % 8 === 0 && marked.length > 0) {
              const victim = marked[Math.floor(Math.random() * marked.length)];
              victim.isDead = true;
            }
            if (currentDeaths >= targetDeaths) deathDoneRef.current = true;
          }
          if (frameRef.current > 180) {
            phaseRef.current = 'idle';
            setIsAnim(false); setCanAdv(true);
          }
        }

        ctx.clearRect(0, 0, CW, CH);
        drawMeadowBg(ctx);
        bfRef.current.forEach(b => drawButterflyEntity(ctx, b));
        drawNetArea(ctx, phaseRef.current);

        if (phase === 'mixing') {
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.font = 'bold 16px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('標記蝴蝶正在混合中...', FIELD_MAX_X / 2, 22);
        }

        rafRef.current = requestAnimationFrame(loop);
      };
      rafRef.current = requestAnimationFrame(loop);
      return () => cancelAnimationFrame(rafRef.current);
    }, []);

    useEffect(() => {
      if (step === 2) {
        setIsAnim(true); setCanAdv(false);
        bfRef.current.forEach(f => {
          if (f.isCaptured) { f.isMarked = true; f.markType = markMethod; }
        });
        phaseRef.current = 'marking'; frameRef.current = 0;
      }
    }, [step]);

    useEffect(() => {
      if (toast) { const t = setTimeout(() => setToast(''), 3000); return () => clearTimeout(t); }
    }, [toast]);

    const handleCapture = (isSecond = false) => {
      const count = parseInt(capInput);
      if (isNaN(count) || count < CAP_MIN || count > CAP_MAX) return;
      const alive = bfRef.current.filter(f => !f.isDead && !f.isCaptured);
      const n = Math.min(count, alive.length);
      if (isSecond) setSecondCap(n); else setFirstCap(n);

      let selected;
      if (isSecond && markMethod === 'metalRing') {
        // Weighted selection: marked butterflies 1.5x more likely
        const pool = [...alive];
        selected = [];
        for (let i = 0; i < n && pool.length > 0; i++) {
          const weights = pool.map(b => b.isMarked ? 1.5 : 1.0);
          const total = weights.reduce((a, b) => a + b, 0);
          let r = Math.random() * total;
          let idx = 0;
          for (let j = 0; j < pool.length; j++) {
            r -= weights[j];
            if (r <= 0) { idx = j; break; }
          }
          selected.push(pool[idx]);
          pool.splice(idx, 1);
        }
      } else {
        // 使用 Fisher-Yates 真正隨機洗牌
        selected = fisherYates(alive).slice(0, n);
      }

      selected.forEach(f => {
        f.isCaptured = true;
        f.targetX = NET_X + 10 + Math.random() * (NET_W - 20);
        f.targetY = NET_Y + 10 + Math.random() * (NET_H - 20);
      });
      phaseRef.current = isSecond ? 'capturing2' : 'capturing1';
      frameRef.current = 0;
      setIsAnim(true); setCanAdv(false); setCapInput(''); setInputError('');
    };

    const handleNext = () => {
      if (!canAdv) return;
      setStep(s => Math.min(s + 1, 4));
      setCanAdv(false); setCapInput('');
    };

    const showControls = !!markMethod;

    return (
      <div className="flex flex-col">
        <Toast msg={toast} />
        <StepIndicator steps={STEP_NAMES.special} currentStep={step} />
        <div className="flex flex-col md:flex-row gap-4 md:gap-6 py-2">
          <div className="w-full md:w-3/5">
            <canvas ref={canvasRef}
              className="w-full rounded-2xl shadow-lg border border-slate-200"
              style={{ aspectRatio: `${CW}/${CH}` }} />
          </div>
          <div className="w-full md:w-2/5 flex flex-col gap-3">
            {/* Marking method selector */}
            <div className="bg-white border border-slate-200 shadow-xl rounded-2xl p-4">
              <h4 className="font-bold text-slate-700 mb-1 text-sm">選擇標記方法</h4>
              <p className="text-xs text-slate-500 mb-3">不同標記方式會影響動物行為或存活率。螢光漆使蝴蝶更易被天敵發現（標記個體死亡→高估），金屬環使蝴蝶行動變慢而更易被重捕（低估）。</p>
              <CustomSelect value={markMethod} onChange={e => setMarkMethod(e.target.value)}
                disabled={firstCap > 0}>
                <option value="">請選擇...</option>
                <option value="fluorescent">螢光漆標記</option>
                <option value="metalRing">金屬環標記</option>
              </CustomSelect>
            </div>

            <div className="bg-white border border-slate-200 shadow-xl rounded-2xl p-5">
              <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                估算結果
              </h3>
              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <span className="text-slate-500 font-medium">實際總數</span>
                  {step < 4 ? <span className="text-2xl font-black text-slate-300">？？？</span>
                    : <span className="text-2xl font-black text-slate-800 animate-reveal">{actualAlive}</span>}
                </div>
                <div className="flex justify-between items-center">
                  <span className="text-slate-500 font-medium">你的估算</span>
                  <span className="text-2xl font-bold text-blue-600">{estimate !== null ? estimate : '---'}</span>
                </div>
                {step >= 4 && errorRate !== null && (
                  <div className={`p-3 rounded-xl border animate-fade-in ${getErrorBg(errorRate)}`}>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-600 font-medium">估算誤差</span>
                      <span className={`text-2xl font-black ${getErrorColor(errorRate)}`}>{formatError(errorRate)}%</span>
                    </div>
                    <p className="text-xs text-slate-400 mt-1 text-right">正值 = 高估，負值 = 低估</p>
                  </div>
                )}
                {step < 4 && (
                  <p className="text-xs text-slate-400 text-center pt-1">完成所有步驟後將顯示結果</p>
                )}
              </div>
            </div>

            <div className="bg-slate-50 shadow-inner rounded-2xl p-4">
              <p className="text-slate-600 font-medium text-sm">
                {!markMethod ? '請先選擇標記方法' : INSTRUCTIONS.special[step - 1]}
              </p>
            </div>

            {showControls && step >= 1 && step < 4 && (
              <div className="bg-white border border-slate-200 rounded-2xl p-4 space-y-3">
                {firstCap > 0 && (
                  <div className="text-sm text-slate-600">
                    <span className="font-bold text-slate-700">M（第一次捕捉）= {firstCap}</span>
                  </div>
                )}
                {step >= 3 && secondCap > 0 && (
                  <div className="text-sm text-slate-600 space-y-1">
                    <div><span className="font-bold text-slate-700">n（第二次捕捉）= {secondCap}</span></div>
                    <div><span className="font-bold text-slate-700">m（其中有標記）= {markedInSec}</span></div>
                    {markedInSec === 0 && (
                      <div className="text-red-500 font-bold text-xs mt-1">第二次捕獲中沒有發現標記個體，請增加捕捉數量後重試</div>
                    )}
                  </div>
                )}
                {((step === 1 && !isAnim && firstCap === 0) || (step === 3 && !isAnim && secondCap === 0)) && (
                  <div className="space-y-1">
                    <div className="flex gap-2">
                      <input type="number" value={capInput} onChange={e => handleCapInputChange(e.target.value)}
                        placeholder={`輸入數量（${CAP_MIN}~${CAP_MAX}）`}
                        className={`flex-1 border-2 rounded-xl py-2.5 px-4 text-slate-700 font-bold
                          focus:outline-none focus:ring-4 shadow-sm transition-all
                          ${inputError ? 'border-red-400 focus:border-red-500 focus:ring-red-500/20' : 'border-slate-300 focus:border-blue-500 focus:ring-blue-500/20'}`} />
                      <button onClick={() => handleCapture(step === 3)} disabled={!capInput || !!inputError || isAnim}
                        className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white
                          font-bold py-2.5 px-5 rounded-xl shadow-lg transition-all">
                        捕捉
                      </button>
                    </div>
                    {inputError && <p className="text-red-500 text-xs font-medium pl-1">{inputError}</p>}
                  </div>
                )}
                {isAnim && <div className="text-blue-500 font-bold text-sm animate-pulse">動畫進行中...</div>}
              </div>
            )}

            {step >= 4 && estimate !== null && (
              <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 animate-fade-in">
                <div className="text-sm text-slate-600 mb-1 font-medium">N = M × n ÷ m</div>
                <div className="text-base font-bold text-slate-700">
                  N = {firstCap} × {secondCap} ÷ {markedInSec} = <span className="text-blue-600 text-xl font-black">{estimate}</span>
                </div>
                <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-xl">
                  <p className="text-sm text-amber-800 font-medium">
                    比較不同標記方式的結果，思考什麼因素影響了估算精準度？
                  </p>
                </div>
              </div>
            )}

            <div className="flex gap-3 mt-auto">
              {step < 4 && showControls && (
                <button onClick={handleNext} disabled={!canAdv}
                  className={`flex-1 font-bold py-3 rounded-xl shadow-lg transition-all duration-200
                    ${canAdv ? 'bg-blue-600 hover:bg-blue-700 text-white hover:scale-105 active:scale-95' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}>
                  下一步
                </button>
              )}
              <button onClick={() => { if (window.confirm('確定要重新開始嗎？')) onReset(); }}
                className="flex-1 bg-white border-2 border-amber-400 text-amber-600 hover:bg-amber-50 font-bold py-3 rounded-xl shadow-sm transition-all">
                重新開始
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ==================== App ====================
  const App = () => {
    const [activeTab, setActiveTab] = useState('quadrat');
    const [resetKey, setResetKey] = useState(0);

    const handleReset = () => setResetKey(k => k + 1);
    const handleTabChange = (tab) => {
      setActiveTab(tab);
      setResetKey(k => k + 1);
    };

    return (
      <div className="min-h-screen flex flex-col bg-slate-50 pb-24">
        <Header />
        <main className="flex-grow w-full max-w-6xl mx-auto flex flex-col relative px-4">
          {activeTab === 'quadrat' && <QuadratTab key={`q-${resetKey}`} onReset={handleReset} />}
          {activeTab === 'capture' && <CaptureTab key={`c-${resetKey}`} onReset={handleReset} />}
          {activeTab === 'special' && <SpecialTab key={`s-${resetKey}`} onReset={handleReset} />}
        </main>
        <BottomNav activeTab={activeTab} onTabChange={handleTabChange} />
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
